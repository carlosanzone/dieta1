<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dieta settimanale – Carlo & Dona</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding: 20px;
      color: #333;
    }

    h1 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 30px;
    }

    label {
      font-weight: bold;
      margin-right: 10px;
    }

    select, button {
      padding: 10px;
      margin: 5px 0 15px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      background: #3498db;
      color: white;
      border: none;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #2980b9;
    }

    h2 {
      margin-top: 30px;
      color: #34495e;
    }

    ul {
      background: white;
      padding: 15px;
      border-radius: 8px;
      list-style: none;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    ul li {
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }

    ul li:last-child {
      border-bottom: none;
    }

    #shopping-list li {
      color: #16a085;
      font-weight: bold;
    }

    #total-calories {
      color: #e74c3c;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h1>Dieta settimanale – Carlo & Dona</h1>

  <label for="person-select">Seleziona persona:</label>
  <select id="person-select">
    <option value="">-- Seleziona --</option>
    <option value="Carlo">Carlo</option>
    <option value="Dona">Dona</option>
  </select>

  <br>

  <label for="day-select">Seleziona giorno:</label>
  <select id="day-select">
    <option value="">-- Seleziona --</option>
    <option value="Lunedì">Lunedì</option>
    <option value="Martedì">Martedì</option>
    <option value="Mercoledì">Mercoledì</option>
    <option value="Giovedì">Giovedì</option>
    <option value="Venerdì">Venerdì</option>
    <option value="Sabato">Sabato</option>
    <option value="Domenica">Domenica</option>
  </select>

  <br>

  <button id="load-diet">Carica dieta del giorno</button>
  <button id="show-shopping">Mostra lista spesa</button>

  <h2>Pasti del giorno</h2>
  <ul id="meal-list"></ul>

  <h3>Totale calorie: <span id="total-calories">0</span></h3>

  <h2>Lista spesa</h2>
  <ul id="shopping-list"></ul>

  <script src="app.js"></script>

</body>
</html>
